name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    strategy:
      matrix:
        runner:
          - ubuntu-latest
          - [self-hosted, macOS, ARM64]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    env:
      NODE_ENV: development
      NPM_CONFIG_PRODUCTION: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean stale artifacts
        run: rm -rf node_modules dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  ui:
    strategy:
      matrix:
        runner:
          - ubuntu-latest
          - [self-hosted, macOS, ARM64]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    env:
      NPM_CONFIG_PRODUCTION: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean stale artifacts
        run: rm -rf node_modules ui/node_modules ui/.next

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Lint UI
        working-directory: ui
        run: pnpm lint

      - name: Test UI
        working-directory: ui
        run: pnpm test

      - name: Build UI
        working-directory: ui
        run: pnpm build
